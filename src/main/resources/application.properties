# ===== Server =====
server.port=8080
server.servlet.context-path=/

# ===== Database =====
spring.datasource.url=jdbc:postgresql://localhost:5432/firefly
spring.datasource.username=firefly
spring.datasource.password=firefly_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=public

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ===== Cache =====
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=10000,expireAfterWrite=300s

# ===== Security =====
firefly.security.default-user-email=admin@firefly.local
firefly.security.default-user-password=changeme

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

# ===== Thymeleaf =====
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===== Logging =====
logging.level.com.firefly=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===== App-specific =====
firefly.currency.default-code=EUR
firefly.exchange-rate.enabled=false
firefly.exchange-rate.api-url=https://api.exchangerate.host/latest