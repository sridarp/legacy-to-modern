# ===== Test profile =====
spring.datasource.url=jdbc:h2:mem:fireflytest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.cache.type=none

# Disable security in tests
firefly.security.default-user-email=test@firefly.local
firefly.security.default-user-password=testpass